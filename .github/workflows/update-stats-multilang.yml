name: Atualizar Estatísticas de Código

on:
  schedule:
    - cron: '0 0 * * 0'  # UTC (domingo 00:00)
  workflow_dispatch:
  repository_dispatch:
    types: [update-stats]

concurrency:
  group: update-stats
  cancel-in-progress: true

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # NÃO fixar ref: main. Deixe pegar o default branch do repo.
      - uses: actions/checkout@v4
        with:
          path: main-repo
          fetch-depth: 0

      - name: Configurar ambiente
        run: |
          sudo apt-get update
          sudo apt-get install -y cloc

      - name: Clonar e analisar repositórios
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p repos
          stats_file="$GITHUB_WORKSPACE/main-repo/stats.md"
          stats_pt_file="$GITHUB_WORKSPACE/main-repo/stats_pt.md"
          stats_en_file="$GITHUB_WORKSPACE/main-repo/stats_en.md"

          clone_repo_with_retry () {
            local repo_name="$1"
            local clone_url="$2"
            local destination="$3"
            local attempt

            rm -rf "$destination"

            for attempt in 1 2 3; do
              if git clone "$clone_url" "$destination"; then
                return 0
              fi

              echo "Tentativa ${attempt}/3 falhou para ${repo_name}"
              rm -rf "$destination"
              sleep $((attempt * 2))
            done

            return 1
          }

          fetch_public_repositories () {
            python3 - <<'PY'
          import json
          import urllib.request

          headers = {
              "Accept": "application/vnd.github+json",
              "User-Agent": "fernandoncidade-public-stats",
          }

          page = 1
          while True:
              url = (
                  "https://api.github.com/users/fernandoncidade/repos"
                  f"?per_page=100&type=owner&sort=full_name&page={page}"
              )
              request = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(request, timeout=30) as response:
                  repos = json.load(response)

              if not repos:
                  break

              for repo in repos:
                  if repo.get("private") or repo.get("fork"):
                      continue
                  print(f"{repo['name']}\t{repo['clone_url']}")

              page += 1
          PY
          }

          mapfile -t repositories < <(fetch_public_repositories)

          if [ "${#repositories[@]}" -eq 0 ]; then
            echo "Nenhum repositório público encontrado pela API do GitHub."
            exit 1
          fi

          total_lines=0
          total_commits=0
          total_horas=0

          {
            echo "| Repositório | Linguagem | Horas Estimadas | Linhas | Commits | Produtividade |"
            echo "|-------------|-----------|-----------------|--------|---------|---------------|"
          } > "$stats_file"
          cp "$stats_file" "$stats_pt_file"

          {
            echo "| Repository | Language | Estimated Hours | Lines | Commits | Productivity |"
            echo "|------------|----------|-----------------|-------|---------|--------------|"
          } > "$stats_en_file"

          for repo_info in "${repositories[@]}"; do
            IFS=$'\t' read -r repo clone_url <<< "$repo_info"

            echo "Processando repositório: $repo"

            if ! clone_repo_with_retry "$repo" "$clone_url" "repos/$repo"; then
              echo "Falha ao clonar $repo (pulando)"
              continue
            fi

            cd "repos/$repo"

            cloc_output="$(cloc --exclude-dir=node_modules,.git --quiet --csv . || true)"
            lines="$(echo "$cloc_output" | awk -F',' 'NR>1 {sum += $5} END {print sum+0}')"
            lines="${lines:-0}"

            # Linguagem dominante (ignorando SUM)
            linguagem="$(echo "$cloc_output" | awk -F',' 'NR>1 && $1!="SUM" && $5>0 {if ($5>max) {max=$5; lang=$1}} END {print (lang=="" ? "N/A" : lang)}')"
            linguagem="${linguagem:-N/A}"

            commits="$(git rev-list --count HEAD 2>/dev/null || echo 0)"
            commits="${commits:-0}"

            case "$linguagem" in
              "Python") taxa_base=15 ;;
              "JavaScript") taxa_base=20 ;;
              "C++") taxa_base=10 ;;
              "HTML") taxa_base=30 ;;
              "CSS") taxa_base=25 ;;
              "Java") taxa_base=12 ;;
              "Markdown") taxa_base=35 ;;
              *) taxa_base=18 ;;
            esac

            case "$repo" in
              *"Monitor"*) complexidade=1.2 ;;
              *"Dashboard"*) complexidade=0.9 ;;
              *"Compression"*) complexidade=1.3 ;;
              "fernandoncidade") complexidade=0.8 ;;
              *) complexidade=1.0 ;;
            esac

            if [ "$lines" -gt 5000 ]; then
              tamanho_ajuste=1.2
            elif [ "$lines" -gt 2000 ]; then
              tamanho_ajuste=1.1
            else
              tamanho_ajuste=1.0
            fi

            taxa_efetiva="$(awk "BEGIN {print $taxa_base / ($complexidade * $tamanho_ajuste)}")"
            horas="$(awk "BEGIN {h = $lines / $taxa_efetiva; print (h > 10) ? h : 10}")"
            horas="$(printf "%.1f" "$horas")"
            produtividade="$(awk "BEGIN {printf \"%.2f\", $lines / $horas}")"

            echo "| $repo | $linguagem | ${horas}h | $lines | $commits | $produtividade l/h |" >> "$stats_file"
            echo "| $repo | $linguagem | ${horas}h | $lines | $commits | $produtividade l/h |" >> "$stats_pt_file"
            echo "| $repo | $linguagem | ${horas}h | $lines | $commits | $produtividade l/h |" >> "$stats_en_file"

            total_lines=$((total_lines + lines))
            total_commits=$((total_commits + commits))
            total_horas="$(awk "BEGIN {printf \"%.1f\", $total_horas + $horas}")"

            cd "$GITHUB_WORKSPACE"
            echo "Repositório $repo processado: $lines linhas, $commits commits, $horas horas estimadas"
          done

          {
            echo "TOTAL_LINES=$total_lines"
            echo "TOTAL_COMMITS=$total_commits"
            echo "TOTAL_HOURS=$total_horas"
          } >> "$GITHUB_ENV"

          echo "| **TOTAL** | - | ${total_horas}h | $total_lines | $total_commits | - |" >> "$stats_file"
          echo "| **TOTAL** | - | ${total_horas}h | $total_lines | $total_commits | - |" >> "$stats_pt_file"
          echo "| **TOTAL** | - | ${total_horas}h | $total_lines | $total_commits | - |" >> "$stats_en_file"

      - name: Atualizar README (idempotente)
        shell: bash
        run: |
          set -euo pipefail
          cd main-repo

          replace_marker () {
            local marker="$1"
            local value="$2"
            perl -i -pe "s/(?:\\b[0-9]+(?:\\.[0-9]+)?\\s*h?\\s*|h\\s*)?<!--\\s*\\Q${marker}\\E\\s*-->/${value} <!-- ${marker} -->/g" README.md
          }

          replace_marker "TOTAL_LINES_PLACEHOLDER" "${{ env.TOTAL_LINES }}"
          replace_marker "TOTAL_COMMITS_PLACEHOLDER" "${{ env.TOTAL_COMMITS }}"
          replace_marker "TOTAL_HOURS_PLACEHOLDER" "${{ env.TOTAL_HOURS }}h"

          python3 - <<'PY'
          from pathlib import Path
          import re

          readme_path = Path("README.md")
          readme = readme_path.read_text(encoding="utf-8")

          blocks = [
              (
                  "PUBLIC_REPOS_STATS_PT_START",
                  "PUBLIC_REPOS_STATS_PT_END",
                  Path("stats_pt.md").read_text(encoding="utf-8").strip(),
              ),
              (
                  "PUBLIC_REPOS_STATS_EN_START",
                  "PUBLIC_REPOS_STATS_EN_END",
                  Path("stats_en.md").read_text(encoding="utf-8").strip(),
              ),
          ]

          for start, end, body in blocks:
              pattern = re.compile(
                  rf"<!--\s*{re.escape(start)}\s*-->.*?<!--\s*{re.escape(end)}\s*-->",
                  re.S,
              )
              replacement = f"<!-- {start} -->\n{body}\n<!-- {end} -->"
              readme, count = pattern.subn(replacement, readme)
              if count == 0:
                  raise SystemExit(f"Marcadores não encontrados: {start}/{end}")

          readme_path.write_text(readme, encoding="utf-8")
          PY

          git diff -- README.md stats.md stats_pt.md stats_en.md || true

      - name: Sanity check (branch e status)
        shell: bash
        run: |
          set -euo pipefail
          cd main-repo
          echo "Branch atual:"
          git rev-parse --abbrev-ref HEAD
          echo "Status:"
          git status --porcelain=v1

      - name: Commit e push das alterações
        run: |
          set -euo pipefail
          cd main-repo

          # Push para o MESMO branch do checkout (não fixar main)
          branch="$(git rev-parse --abbrev-ref HEAD)"

          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

          git add README.md stats.md stats_pt.md stats_en.md
          git commit -m "Atualiza estatísticas de código [skip ci]" || echo "No changes to commit"
          git push origin "$branch"
