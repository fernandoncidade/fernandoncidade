name: Atualizar Estatísticas de Código

on:
  schedule:
    - cron: '0 0 * * 0'  # Executa todo domingo à meia-noite
  workflow_dispatch:      # Permite execução manual

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      # Passo 1: Checkout do seu repositório principal (onde o README.md está)
      - uses: actions/checkout@v4

      # Passo 2: Instalar o 'cloc' para contagem de linhas
      - name: Configurar ambiente
        run: |
          sudo apt-get update
          sudo apt-get install -y cloc

      # Passo 3: Clonar cada repositório, analisar e atualizar o README em tempo real
      - name: Clonar, analisar repositórios e atualizar README
        run: |
          # Lista de repositórios para analisar
          repositories=(
            "Panoptes_Patrol_File_Monitor"
            "Agenda_Avaliacoes_Academicas"
            "Manager_Compression_PySide6_v.0.0.1"
            "Manager_Compression_PyQt6_v.0.0.1"
            "eisenhower_organizing"
            "Programa_Urna_Eletronica"
            "Dashboard_Streamlit-Plotly-Pandas_Management"
            "Dashboard_Streamlit-Plotly-Pandas_Pareto-Diagram_ABC-Curve"
            "Dashboard_TkInter_Pareto-Diagram_ABC-Curve"
            "sloth-highlander-theme-1"
          )
          
          # Criar um diretório temporário para os clones
          mkdir -p repos_temp
          
          for repo_name in "${repositories[@]}"; do
            echo "Processando $repo_name..."
            
            # Clonar o repositório específico
            git clone --depth 1 "https://github.com/fernandoncidade/$repo_name.git" "repos_temp/$repo_name" || continue
            
            # Entrar no diretório do repositório clonado
            cd "repos_temp/$repo_name"
            
            # Contagem de linhas com cloc (excluindo arquivos de dependências, etc.)
            lines=$(cloc --exclude-dir=node_modules,vendor,.git --quiet --csv . | tail -n 1 | cut -d, -f5)
            
            # Contagem de commits (necessário um clone completo, não --depth 1)
            # Para isso, precisamos remover o --depth 1 do clone e "unshallow" o repositório
            # git fetch --unshallow || echo "Repositório já completo."
            # Como a contagem de commits pode tornar o processo lento, vamos buscar o histórico completo
            # Removendo o --depth 1 do clone inicial e fazendo um clone completo
            cd ../.. # Volta para a raiz
            rm -rf "repos_temp/$repo_name" # Remove o clone superficial
            git clone "https://github.com/fernandoncidade/$repo_name.git" "repos_temp/$repo_name" # Clona completo
            cd "repos_temp/$repo_name"
            
            commits=$(git rev-list --count HEAD)
            
            # Voltar para o diretório raiz do workflow
            cd ../..

            # Gerar o nome do placeholder a partir do nome do repositório
            # Ex: "Panoptes_Patrol_File_Monitor" -> "PANOPTES_PATROL_FILE_MONITOR"
            placeholder_base=$(echo "$repo_name" | tr '[:lower:]' '[:upper:]' | tr '-' '_')
            
            # Atualizar os placeholders de linhas e commits no README.md principal
            # Usamos `|` como delimitador do sed para evitar conflitos com `|${lines}|g" README.md
            sed -i "s||${commits}|g" README.md

            # Limpar o repositório clonado para economizar espaço
            rm -rf "repos_temp/$repo_name"
          done

      # Passo 4: Fazer o commit e push das alterações no README.md
      - name: Commit e push das alterações
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          # Adicionar o -A para garantir que o README.md seja stageado
          git add -A
          # Verificar se há mudanças antes de commitar
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "chore: Atualiza estatísticas dos repositórios [skip ci]"
            git push
          else
            echo "Nenhuma mudança para commitar."
          fi
